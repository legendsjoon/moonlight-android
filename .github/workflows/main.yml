name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        submodules: true
        fetch-depth: 0

    - name: Update submodules
      run: git submodule update --init --recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Android SDK
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk
        sudo mkdir -p /usr/local/lib/android/sdk/cmdline-tools/latest
        sudo chown -R $USER:$USER /usr/local/lib/android/sdk
        curl -o sdk-tools-linux.zip https://dl.google.com/android/repository/commandlinetools-linux-8512546_latest.zip
        unzip sdk-tools-linux.zip -d /usr/local/lib/android/sdk/cmdline-tools/latest
        /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=/usr/local/lib/android/sdk "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;27.0.12077973"

    - name: Grant execute permission for Gradlew
      run: chmod +x ./gradlew

    - name: Clean project
      run: ./gradlew clean

    - name: Get versionName from build.gradle
      id: get_version_name
      run: |
        versionName=$(./gradlew -q printVersionName)
        echo "VERSION_NAME=$versionName" >> $GITHUB_ENV

    - name: Build Android project
      run: ./gradlew assembleRelease --stacktrace  # Build the project with Gradle

    - name: Upload APK as artifact
      uses: actions/upload-artifact@v3
      with:
        path: app/build/outputs/apk/**/*.apk  # Correct indentation here

    - name: Create a release
      id: create_release
      uses: actions/create-release@v1
      with:
        tag_name: ${{ env.VERSION_NAME }}
        release_name: "Release ${{ env.VERSION_NAME }}"
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload APK to GitHub Release
      uses: actions/upload-release-asset@v1
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: app/build/outputs/apk/**/*.apk
        asset_content_type: application/vnd.android.package-archive
