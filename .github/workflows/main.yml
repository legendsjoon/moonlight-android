name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        submodules: true
        fetch-depth: 0

    - name: Update submodules
      run: git submodule update --init --recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Android SDK
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk
        sudo mkdir -p /usr/local/lib/android/sdk/cmdline-tools/latest
        sudo chown -R $USER:$USER /usr/local/lib/android/sdk
        curl -o sdk-tools-linux.zip https://dl.google.com/android/repository/commandlinetools-linux-8512546_latest.zip
        unzip sdk-tools-linux.zip -d /usr/local/lib/android/sdk/cmdline-tools/latest
        /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=/usr/local/lib/android/sdk "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;27.0.12077973"
    - name: Grant execute permission for Gradlew
      run: chmod +x ./gradlew

    - name: Clean project
      run: ./gradlew clean

    - name: Decode and save keystore
      run: echo "$ANDROID_KEYSTORE" | base64 --decode > /tmp/keystore.jks

    - name: Cache Gradle dependencies
      uses: actions/cache@v3
      with:
        path: ~/.gradle/caches
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Build app using Gradle
      run: ./gradlew assembleRelease

    - name: Sign the APK
      run: ./gradlew assembleRelease -Psigning.storeFile=/tmp/keystore.jks -Psigning.storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} -Psigning.keyAlias=${{ secrets.ANDROID_KEY_ALIAS }} -Psigning.keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}

    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        path: app/build/outputs/apk/release/*.apk
